<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solena Jewelry</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#fffaf7;
color:#333;
}

header{
background:#d4af37;
padding:20px;
text-align:center;
color:white;
}

header h1{
font-size:36px;
}

header p{
margin-top:8px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:40px;
}

.product{
background:white;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
padding:20px;
text-align:center;
transition:.3s;
}

.product:hover{
transform:translateY(-6px);
}

.product img{
width:100%;
border-radius:10px;
}

.product h3{
margin:15px 0 10px;
}

.price{
font-size:22px;
color:#d4af37;
font-weight:bold;
}

button{
margin-top:15px;
padding:10px 20px;
background:#d4af37;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#b89028;
}

footer{
text-align:center;
padding:30px;
background:#222;
color:white;
margin-top:40px;
}
</style>

</head>

<body>

<header>
<h1>Solena Jewelry</h1>
<p>Elegant Jewelry Collection</p>
</header>

<section class="products">
    <div class="product">
    <img src="pic1.png.png" alt="Crystal Charm Bracelet">
    <h3>Crystal Charm Bracelet</h3>
    <p class="price">€15</p>
    <button class="add-to-cart">Add to Cart</button>
</div>

<div class="product">
    <img src="pic2.png.png" alt="Moon Crab Pendant">
    <h3>Moon Crab Pendant</h3>
    <p class="price">€15</p>
    <button class="add-to-cart">Add to Cart</button>
</div>

<div class="product">
    <img src="pic3.png.png" alt="Cross Charm Necklace">
    <h3>Cross Charm Necklace</h3>
    <p class="price">€17</p>
    <button class="add-to-cart">Add to Cart</button>
</div>

<div class="product">
    <img src="pic4.png.png" alt="Birthstone Pendant">
    <h3>Birthstone Pendant</h3>
    <p class="price">€12</p>
    <button class="add-to-cart">Add to Cart</button>
</div>

<div class="product">
    <img src="pic5.png.png" alt="Tree of Life Necklace">
    <h3>Tree of Life Necklace</h3>
    <p class="price">€15</p>
    <button class="add-to-cart">Add to Cart</button>
</div>
</section>

<footer>
    <h3>Solena Jewelry</h3>
    <p>Handpicked jewelry with love ✨</p>
    <p>Instagram: @solena_jewelrycy</p>
    <p>&copy; 2026 Solena Jewelry. All rights reserved.</p>
</footer>

</body>
</html>
